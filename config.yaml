# ============================================================
# Sentinel — Central Configuration
# ============================================================
# All tunable parameters live here. Never hardcode values
# in source files — always read from this config instead.
# Credentials (SMTP passwords, API keys) go in .env, not here.
# ============================================================

# ------------------------------------------------------------
# Network capture settings
# ------------------------------------------------------------
capture:
  # Which network interfaces to capture on.
  #
  # Set to "auto" to automatically detect and monitor every active,
  # non-loopback interface (WiFi, Ethernet, USB tethering, etc.) at
  # once. This is the recommended default — it means Sentinel keeps
  # working correctly even if you switch from WiFi to Ethernet, or
  # plug in a second adapter.
  #
  # To monitor only specific interfaces instead, replace "auto" with
  # a list, e.g.:
  #   interfaces: ["wlo1", "enp2s0"]
  #
  # Run `ip link show` to see interface names on your machine.
  interfaces: "auto"

  # How long (in seconds) to accumulate packets before computing
  # flow features and running detection. Shorter = more responsive
  # but higher CPU. Longer = more stable features, higher latency.
  window_seconds: 5

  # Maximum number of active flows to track simultaneously.
  # Older flows are evicted when this limit is hit.
  max_active_flows: 10000

  # How long (in seconds) an idle flow is kept before it is
  # considered finished and sent to feature extraction.
  flow_timeout_seconds: 30

# ------------------------------------------------------------
# Detection settings
# ------------------------------------------------------------
detection:
  # Number of flows to collect silently on startup before
  # flagging anomalies. Gives the model a baseline of normal
  # traffic before it starts alerting.
  warmup_flows: 30

  # Isolation Forest contamination parameter (0.0 – 0.5).
  # Rough estimate of the fraction of traffic that is malicious.
  # Start at 0.01 (1%) and tune based on your false-positive rate.
  contamination: 0.01

  # Anomaly score thresholds (raw Isolation Forest score).
  # Scores are negative: closer to 0 = more anomalous.
  #
  # Set from real score distributions observed during Phase 1 testing
  # (June 2026), AFTER applying the constant-column-filtering fix
  # documented in detection/anomaly.py (see MIN_FEATURE_VARIANCE and
  # N_ESTIMATORS there for the full evidence and reasoning):
  #   - Normal traffic (including normal ping bursts): as low as
  #     -0.013 at the 1st percentile in testing.
  #   - A genuine 4000-packet ICMP flood (zero packet loss, confirmed
  #     via real capture): -0.0136 — still NOT clearly separated from
  #     normal traffic's noise floor even after the fix.
  #   - A simulated SYN port scan: around -0.115 — very clearly
  #     separated, comfortably past either threshold.
  #
  # KNOWN LIMITATION — confirmed via direct testing, partially
  # improved, not fully solved (see detection/anomaly.py docstring and
  # PHASES.md Phase 5 backlog for full details):
  # Flood-style attacks (very high packet rate, very uniform low
  # inter-arrival time) remain only weakly separable from normal
  # traffic with the current feature set and Isolation Forest
  # approach, even after removing constant features and increasing
  # n_estimators (which together roughly doubled the separation, but
  # not enough to clear a safe threshold without unacceptable false
  # positives on normal bursty traffic). Port-scan-style attacks
  # (high SYN ratio, zero payload) are detected very reliably and are
  # unaffected by this limitation. A dedicated rate-based detector
  # (e.g. a simple packets-per-second threshold check, separate from
  # the general-purpose Isolation Forest) is the most promising next
  # step for flood detection specifically — tracked as a Phase 3/5
  # backlog item rather than solved here, since it is a different
  # detection mechanism, not a tuning tweak.
  thresholds:
    suspicious: -0.015   # Score below this → SUSPICIOUS (log + monitor)
    attack: -0.05          # Score below this → ATTACK (block + alert)

  # Minimum number of labelled samples required before the
  # supervised classifier (XGBoost) is enabled.
  # Below this count, only the anomaly detector runs.
  min_classifier_samples: 10

  # Number of suspicion events from the same IP within this
  # time window (seconds) before escalating to a block.
  repeat_offender_count: 3
  repeat_offender_window_seconds: 3600  # 1 hour

# ------------------------------------------------------------
# DDoS detection settings (aggregate, cross-source tracking)
# ------------------------------------------------------------
# This is intentionally separate from the per-flow anomaly detector
# above. A per-flow detector (even with the flood-rate guard) can
# never see a DDoS, where many different sources each send a low,
# individually-unremarkable amount of traffic that only becomes
# alarming in aggregate. See detection/ddos_tracker.py for the full
# reasoning.
ddos:
  # How far back (in seconds) to look when computing aggregate rates.
  window_seconds: 10.0

  # ATTACK requires BOTH thresholds to be exceeded together — this
  # is what distinguishes a real multi-source DDoS from a single busy
  # source (which the per-flow flood-rate guard already handles) or
  # a single organic burst of normal traffic.
  attack_total_flows_threshold: 500
  attack_distinct_sources_threshold: 20

  # SUSPICIOUS fires if EITHER threshold alone is elevated — a softer
  # early-warning signal, logged but not auto-blocked.
  suspicious_total_flows_threshold: 200
  suspicious_distinct_sources_threshold: 10

# ------------------------------------------------------------
# Brute-force / credential-stuffing detection settings
# ------------------------------------------------------------
# Per-(src_ip, dst_ip, dst_port) sliding-window connection-attempt
# tracker for auth-related services (SSH, RDP, FTP, etc.). Mirrors
# the port_scan tracker's approach: deterministic, rule-based, no LLM
# confirmation needed. See detection/brute_force_tracker.py for the
# full detection logic and its documented "known limitations" —
# Sentinel can only proxy "failed login" via connection rate, never
# an actual auth outcome, since payloads are never inspected.
brute_force:
  # How far back (in seconds) to look when computing attempt rate.
  window_seconds: 60

  # Attempt counts within window_seconds to flag SUSPICIOUS / ATTACK.
  suspicious_threshold: 5
  attack_threshold: 15

  # Destination ports treated as auth-related services worth
  # watching. Add/remove based on what you actually run — leaving an
  # unused service in this list is harmless (no traffic ever hits
  # it), but watching a port you DO run for something unrelated to
  # remote auth may produce noise.
  watched_ports:
    - 22    # SSH
    - 3389  # RDP
    - 21    # FTP
    - 23    # Telnet
    - 3306  # MySQL
    - 5432  # PostgreSQL

# ------------------------------------------------------------
# Response settings
# ------------------------------------------------------------
response:
  # Master switch. Set to true during development to log what
  # WOULD be blocked without actually running iptables commands.
  dry_run: false

  # How long (in minutes) a blocked IP stays blocked before
  # the rule is automatically removed.
  # TEMPORARY: set to 1 for expiry testing — bump back to a real
  # duration (e.g. 60) once you're done watching blocks expire.
  block_duration_minutes: 1

  # Repeat-offender escalation: a source that crosses the ATTACK
  # threshold again after a previous block gets THIS duration instead
  # of block_duration_minutes, up to escalation_max_multiplier times
  # the base duration. Currently consumed by response/blocker.py's
  # block() `duration_minutes` override, driven by each tracker's
  # `repeat_offender_count` (see brute_force_tracker.py /
  # port_scan_tracker.py) — a first-time offender gets the standard
  # duration; a repeat offender gets progressively longer blocks.
  escalation_multiplier: 3
  escalation_max_multiplier: 10

  # IPs that will NEVER be blocked regardless of score.
  # Always include your router gateway and any trusted machines.
  whitelist_ips:
    - "127.0.0.1"
    - "::1"
    - "192.168.1.1"   # <-- replace with your router IP

  # Block private/LAN IP ranges? Almost always false unless you are
  # specifically hunting for insider threats on the LAN — but true
  # here since Azazel's whole real network (192.168.x.x LAN,
  # 172.17.x.x Docker bridge) is private-range, so leaving this false
  # would make blocking a no-op against all real test traffic.
  block_private_ranges: true

# ------------------------------------------------------------
# Alerting settings
# ------------------------------------------------------------
alerting:
  # Set to true to send a test alert on startup and verify that your
  # alert channels are configured correctly.
  # Verified working end-to-end against the webhook channel (July
  # 2026) — set back to false here per the original TEMPORARY note,
  # so you're not getting a synthetic alert every run. Flip back to
  # true any time you change alerting config and want to re-verify.
  test_on_startup: false

  # Minimum seconds between alerts for the same source IP.
  # Prevents alert storms when one IP probes repeatedly.
  rate_limit_seconds: 600  # 10 minutes

  # Enable/disable individual channels.
  # Credentials for each channel go in .env (see .env.example).
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    sender: ""       # Set in .env: SENTINEL_EMAIL_SENDER
    recipient: ""    # Set in .env: SENTINEL_EMAIL_RECIPIENT

  slack:
    enabled: false
    # Set webhook URL in .env: SENTINEL_SLACK_WEBHOOK

  webhook:
    enabled: true
    # Set URL in .env: SENTINEL_WEBHOOK_URL

# ------------------------------------------------------------
# GeoIP settings
# ------------------------------------------------------------
geoip:
  # Primary lookup method: "api" uses ip-api.com (free, online).
  # "maxmind" uses a local GeoLite2 database (offline, faster).
  method: "api"

  # Path to MaxMind GeoLite2 database file (only used if method = "maxmind").
  maxmind_db_path: "data/GeoLite2-City.mmdb"

  # How many resolved IPs to keep in memory to avoid re-querying.
  cache_size: 1000

# ------------------------------------------------------------
# Logging and storage
# ------------------------------------------------------------
storage:
  # SQLite database for all flow logs and labelled samples.
  db_path: "data/logs/sentinel.db"

  # Plain-text JSON-lines log for detections (one JSON object per line).
  detections_log: "data/logs/detections.log"

  # Plain-text JSON-lines log for block/unblock actions.
  blocks_log: "data/logs/blocks.log"

  # Training history log.
  training_log: "data/logs/training_history.log"

# ------------------------------------------------------------
# LLM-assisted flow analysis (Phase 2)
# ------------------------------------------------------------
# Used to reason about SUSPICIOUS/ATTACK flows and assign a specific
# attack-type label, which becomes training data for the supervised
# classifier (Phase 2). Only called for flows that the anomaly
# detector already flagged — never for NORMAL flows — to keep usage
# (and cost, for paid providers) low.
llm:
  # "nim" (NVIDIA NIM, free tier, OpenAI-compatible API — default) or
  # "anthropic" (Claude API, requires prepaid credit, no free tier).
  # Swapping providers only requires changing this value and setting
  # the matching API key in .env — see detection/llm_analyser.py.
  provider: "nim"

  # NVIDIA NIM settings (only used when provider: "nim")
  nim:
    base_url: "https://integrate.api.nvidia.com/v1"
    model: "meta/llama-3.1-8b-instruct"

  # Anthropic settings (only used when provider: "anthropic")
  anthropic:
    model: "claude-sonnet-4-6"

  # Shared settings, used regardless of provider:

  # Only flows with an anomaly score below this (more negative =
  # more anomalous) get sent to the LLM at all. This is a SEPARATE,
  # stricter threshold than detection.thresholds.suspicious — calling
  # an LLM on every mildly-unusual flow would be wasteful even on a
  # free tier (rate limits still apply), so only the more confidently
  # unusual flows get the extra LLM reasoning step.
  min_score_for_analysis: -0.03

  # Maximum LLM calls allowed per minute — protects against burning
  # through free-tier rate limits during a real attack (when many
  # flows might be flagged in a short window) or during testing.
  #
  # Raised from 20 -> 35 (July 2026): DB inspection showed 257 flows
  # stored as label="unknown", source="llm_failed", the large
  # majority (204 in a single hour on 2026-07-09) due to hitting this
  # limit during a traffic burst. NVIDIA NIM's actual free-tier
  # baseline is ~40 requests/minute (community-confirmed by NVIDIA
  # staff, not a published SLA) -- 35 leaves a small safety margin
  # under that real ceiling while roughly doubling prior throughput.
  # See detection/llm_analyser.py's "Rate-limit retry queue" section
  # for the complementary fix that queues/retries calls blocked by
  # this limit instead of dropping them outright.
  max_calls_per_minute: 35

  # Request timeout in seconds — if the LLM provider doesn't respond
  # in time, Sentinel falls back to the anomaly detector's own verdict
  # rather than blocking the whole pipeline waiting on a slow request.
  timeout_seconds: 10

# ------------------------------------------------------------
# Model storage
# ------------------------------------------------------------
models:
  # Directory where trained model files are saved.
  model_dir: "data/models"

  # How many historical model versions to keep before deleting old ones.
  keep_versions: 5

# ------------------------------------------------------------
# Dashboard / API settings
# ------------------------------------------------------------
dashboard:
  # Port the FastAPI backend listens on.
  api_port: 8000

  # Set a long random string here (or in .env: SENTINEL_API_KEY).
  # All dashboard API requests must include this key.
  api_key: ""

  # How many recent flows to return from /api/flows/recent.
  recent_flows_limit: 100